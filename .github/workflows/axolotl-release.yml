name: Axolotl release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: axolotl-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-24.04
    env:
      SQLX_OFFLINE: true
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release guardrails
        run: |
          node scripts/axolotl/brand-guard.mjs
          node scripts/axolotl/i18n-check.mjs
          cargo fmt --all --check

  build-smoke:
    name: Build smoke test (Linux x64)
    needs: preflight
    runs-on: ubuntu-24.04
    env:
      SQLX_OFFLINE: true
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install Linux dependencies
        run: sudo apt-get -o Acquire::ForceIPv4=true update && sudo apt-get -o Acquire::ForceIPv4=true install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set release version
        run: node scripts/axolotl/set-version.mjs "${{ github.ref_name }}"

      - name: Build and upload Linux x64 smoke release
        uses: tauri-apps/tauri-action@1ddc7b49b13c3038297360482fcb3e058764d7c9 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/app
          tauriScript: pnpm tauri
          args: --config tauri-release.conf.json
          tagName: ${{ github.ref_name }}
          releaseName: Axolotl Launcher ${{ github.ref_name }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          updaterJsonPreferNsis: true
          retryAttempts: 2

  build:
    name: Build (${{ matrix.name }})
    needs: build-smoke
    strategy:
      fail-fast: true
      max-parallel: 3
      matrix:
        include:
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            args: --config tauri-release.conf.json
          - name: Windows x64
            runner: windows-2025
            args: --config tauri-release.conf.json
          - name: macOS universal
            runner: macos-15
            args: --target universal-apple-darwin --config tauri-release.conf.json
    runs-on: ${{ matrix.runner }}
    env:
      SQLX_OFFLINE: true
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Add macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get -o Acquire::ForceIPv4=true update && sudo apt-get -o Acquire::ForceIPv4=true install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set release version
        run: node scripts/axolotl/set-version.mjs "${{ github.ref_name }}"

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@1ddc7b49b13c3038297360482fcb3e058764d7c9 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_BUNDLER_DMG_IGNORE_CI: ${{ runner.os == 'macOS' && 'true' || '' }}
        with:
          projectPath: apps/app
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: Axolotl Launcher ${{ github.ref_name }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          updaterJsonPreferNsis: true
          retryAttempts: 2

  verify-and-publish:
    name: Verify and publish
    needs: [build-smoke, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download update manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${GITHUB_REF_NAME}" --pattern latest.json --dir release-check

      - name: Verify update manifest
        run: node scripts/axolotl/verify-update-manifest.mjs release-check/latest.json "${GITHUB_REF_NAME}"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            gh release edit "${GITHUB_REF_NAME}" --draft=false --prerelease
          else
            gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
          fi

  sync-mirrors:
    name: Sync stable release mirrors
    if: ${{ !contains(github.ref_name, '-') }}
    needs: verify-and-publish
    runs-on: ubuntu-24.04
    env:
      CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc

      - name: Download published release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${GITHUB_REF_NAME}" --dir release-assets

      - name: Verify mirror credentials
        run: |
          test -n "$CNB_TOKEN" || { echo "CNB_TOKEN is not configured" >&2; exit 1; }
          test -n "$GITEE_TOKEN" || { echo "GITEE_TOKEN is not configured" >&2; exit 1; }

      - name: Sync CNB mirror
        env:
          MIRROR_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          set -euo pipefail
          mirror_dir="$RUNNER_TEMP/cnb-mirror"
          rm -rf "$mirror_dir"
          mkdir -p "$mirror_dir"
          git init "$mirror_dir"
          git -C "$mirror_dir" remote add origin "https://cnb.cool/axlmc/Axolotl.git"
          git -C "$mirror_dir" fetch origin main || true
          git -C "$mirror_dir" checkout -B main
          git -C "$mirror_dir" config user.name "Axolotl Release Bot"
          git -C "$mirror_dir" config user.email "actions@users.noreply.github.com"
          find "$mirror_dir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp release-assets/* "$mirror_dir"/
          node scripts/axolotl/mirror-release.mjs \
            release-assets/latest.json \
            "$mirror_dir/latest.json" \
            "https://cnb.cool/axlmc/Axolotl/-/raw/main"
          git -C "$mirror_dir" add --all
          git -C "$mirror_dir" commit -m "Publish ${GITHUB_REF_NAME}" || true
          git -C "$mirror_dir" -c http.extraheader="Authorization: Basic $(printf 'cnb:%s' "$MIRROR_TOKEN" | base64 -w 0)" push --force origin HEAD:main

      - name: Sync Gitee mirror
        env:
          MIRROR_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail
          mirror_dir="$RUNNER_TEMP/gitee-mirror"
          rm -rf "$mirror_dir"
          mkdir -p "$mirror_dir"
          git init "$mirror_dir"
          git -C "$mirror_dir" remote add origin "https://gitee.com/mystic-stars/axolotl.git"
          git -C "$mirror_dir" fetch origin main || true
          git -C "$mirror_dir" checkout -B main
          git -C "$mirror_dir" config user.name "Axolotl Release Bot"
          git -C "$mirror_dir" config user.email "actions@users.noreply.github.com"
          find "$mirror_dir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp release-assets/* "$mirror_dir"/
          node scripts/axolotl/mirror-release.mjs \
            release-assets/latest.json \
            "$mirror_dir/latest.json" \
            "https://gitee.com/mystic-stars/axolotl/raw/main"
          git -C "$mirror_dir" add --all
          git -C "$mirror_dir" commit -m "Publish ${GITHUB_REF_NAME}" || true
          git -C "$mirror_dir" -c http.extraheader="Authorization: Basic $(printf 'mystic-stars:%s' "$MIRROR_TOKEN" | base64 -w 0)" push --force origin HEAD:main
