name: Axolotl release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: axolotl-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-24.04
    env:
      SQLX_OFFLINE: true
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release guardrails
        run: |
          node scripts/axolotl/brand-guard.mjs
          node scripts/axolotl/i18n-check.mjs
          cargo fmt --all --check

      - name: Prepare draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_release="$(
            gh release list --limit 100 --json tagName \
              --jq ".[] | select(.tagName == \"${GITHUB_REF_NAME}\") | .tagName"
          )"
          if [[ -n "$existing_release" ]]; then
            echo "Release ${GITHUB_REF_NAME} already exists"
            exit 0
          fi

          release_args=(
            --draft
            --generate-notes
            --title "Axolotl Launcher ${GITHUB_REF_NAME}"
          )
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            release_args+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" "${release_args[@]}"

  build:
    name: Build (${{ matrix.name }})
    needs: preflight
    strategy:
      fail-fast: true
      max-parallel: 4
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            args: --config tauri-release.conf.json
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            args: --config tauri-release.conf.json
          - name: Windows x64
            runner: windows-2025
            args: --config tauri-release.conf.json
          - name: macOS universal
            runner: macos-15
            args: --target universal-apple-darwin --config tauri-release.conf.json
    runs-on: ${{ matrix.runner }}
    env:
      SQLX_OFFLINE: true
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Add macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get -o Acquire::ForceIPv4=true update && sudo apt-get -o Acquire::ForceIPv4=true install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set release version
        run: node scripts/axolotl/set-version.mjs "${{ github.ref_name }}"

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@1ddc7b49b13c3038297360482fcb3e058764d7c9 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_BUNDLER_DMG_IGNORE_CI: ${{ runner.os == 'macOS' && 'true' || '' }}
        with:
          projectPath: apps/app
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: Axolotl Launcher ${{ github.ref_name }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          includeUpdaterJson: false
          updaterJsonPreferNsis: true
          retryAttempts: 2

  build-arch-package:
    name: Build (Arch Linux x64)
    needs: preflight
    runs-on: ubuntu-24.04
    container: archlinux:base-devel
    env:
      SQLX_OFFLINE: true
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git \
            github-cli \
            gnupg \
            nodejs \
            pnpm \
            pacman-contrib \
            rustup \
            webkit2gtk-4.1 \
            libayatana-appindicator \
            librsvg \
            xdg-utils

      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        run: rustup default stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set release version
        run: node scripts/axolotl/set-version.mjs "${{ github.ref_name }}"

      - name: Build Arch package
        working-directory: apps/app/arch
        env:
          AXOLOTL_BINARY: ${{ github.workspace }}/target/release/Axolotl Launcher
          AXOLOTL_ICON_DIR: ${{ github.workspace }}/apps/app/icons
          AXOLOTL_LICENSE: ${{ github.workspace }}/COPYING.md
          AXOLOTL_PKGVER: ${{ github.ref_name }}
        run: |
          export AXOLOTL_PKGVER="${AXOLOTL_PKGVER#v}"
          export AXOLOTL_PKGVER="${AXOLOTL_PKGVER/-/.r}"
          pnpm --dir .. tauri build --no-bundle
          useradd --create-home builder
          chown -R builder:builder .
          su -m builder -s /bin/bash -c 'HOME=/home/builder makepkg --noconfirm --nodeps'
      - name: Build pacman repository database
        if: ${{ !contains(github.ref_name, '-') }}
        working-directory: apps/app/arch
        env:
          PACMAN_GPG_PRIVATE_KEY: ${{ secrets.PACMAN_GPG_PRIVATE_KEY }}
          PACMAN_GPG_KEY_ID: ${{ vars.PACMAN_GPG_KEY_ID }}
        run: |
          test -n "$PACMAN_GPG_PRIVATE_KEY"
          test -n "$PACMAN_GPG_KEY_ID"
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          printf '%s\n' "$PACMAN_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --list-secret-keys "$PACMAN_GPG_KEY_ID"
          gpg --batch --yes --local-user "$PACMAN_GPG_KEY_ID" --detach-sign axolotl-launcher-*-x86_64.pkg.tar.zst
          repo-add --sign --key "$PACMAN_GPG_KEY_ID" axolotl.db.tar.gz axolotl-launcher-*-x86_64.pkg.tar.zst
          cp axolotl.db.tar.gz axolotl.db
          cp axolotl.db.tar.gz.sig axolotl.db.sig
          gpg --batch --export "$PACMAN_GPG_KEY_ID" > axolotl-launcher.gpg

      - name: Validate Arch package
        working-directory: apps/app/arch
        run: |
          pacman -Qip axolotl-launcher-*-x86_64.pkg.tar.zst
          pacman -Qlp axolotl-launcher-*-x86_64.pkg.tar.zst

      - name: Upload Arch package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            apps/app/arch/axolotl-launcher-*-x86_64.pkg.tar.zst \
            --clobber

      - name: Upload pacman package signature
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            apps/app/arch/axolotl-launcher-*-x86_64.pkg.tar.zst.sig \
            --clobber

      - name: Upload pacman repository metadata
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            apps/app/arch/axolotl.db \
            apps/app/arch/axolotl.db.sig \
            apps/app/arch/axolotl-launcher.gpg \
            apps/app/arch/axolotl-launcher.repo \
            --clobber

  verify-and-publish:
    name: Verify and publish
    needs: [build, build-arch-package]
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download updater signatures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${GITHUB_REF_NAME}" --pattern '*.sig' --dir release-check/signatures

      - name: Download release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/releases" \
              --paginate \
              --jq ".[] | select(.tag_name == \"${GITHUB_REF_NAME}\") | .id"
          )"
          if [[ -z "$release_id" ]]; then
            echo "Release ${GITHUB_REF_NAME} was not found"
            exit 1
          fi
          gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" > release-check/release.json

      - name: Generate update manifest
        run: node scripts/axolotl/create-update-manifest.mjs release-check/release.json release-check/signatures "${GITHUB_REF_NAME}" release-check/latest.json

      - name: Verify update manifest
        run: node scripts/axolotl/verify-update-manifest.mjs release-check/latest.json "${GITHUB_REF_NAME}"

      - name: Upload update manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" release-check/latest.json --clobber

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            gh release edit "${GITHUB_REF_NAME}" --draft=false --prerelease
          else
            gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
          fi

  publish-aur:
    name: Publish AUR package
    if: ${{ !contains(github.ref_name, '-') && vars.PUBLISH_AUR == 'true' }}
    needs: verify-and-publish
    runs-on: ubuntu-24.04
    container: archlinux:base-devel
    steps:
      - name: Install publishing dependencies
        run: pacman -Syu --noconfirm git nodejs openssh

      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate AUR package metadata
        run: node scripts/axolotl/prepare-aur-package.mjs "${GITHUB_REF_NAME}" aur-release

      - name: Generate .SRCINFO
        working-directory: aur-release
        run: |
          useradd --create-home builder
          chown -R builder:builder .
          su builder -s /bin/bash -c 'makepkg --printsrcinfo > .SRCINFO'

      - name: Publish AUR package
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts
          git clone git@aur.archlinux.org:axolotl-launcher.git aur-remote
          cp aur-release/PKGBUILD aur-release/.SRCINFO aur-release/axolotl-launcher.desktop aur-release/red.ghs.axolotl.xml aur-remote/
          cd aur-remote
          git config user.name 'Axolotl Release'
          git config user.email 'build@ghs.red'
          git add PKGBUILD .SRCINFO axolotl-launcher.desktop red.ghs.axolotl.xml
          if ! git diff --cached --quiet; then
            git commit -m "Update to ${GITHUB_REF_NAME}"
            git push origin HEAD:master
          fi
