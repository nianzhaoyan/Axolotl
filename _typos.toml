[files]
extend-exclude = [
  "**/src/locales/",
  "apps/frontend/",
  "patches/",
  "packages/utils/",
  "packages/ui/",
  "packages/blog/",
  # contains licenses like `CC-BY-ND-4.0`
  "packages/moderation/src/data/stages/license.ts",
  # contains payment card IDs like `IY1VMST1MOXS` which are flagged
  "apps/labrinth/src/queue/payouts/mod.rs",
  # Generated mod search index contains project slugs, names, and compressed data.
  "packages/app-lib/src/api/content_search/WikiEntries.txt",
]

[default.extend-words]
# Terms Of Use in `tou-link`
tou = "tou"
# Google Ad Manager
gam = "gam"
# short for "constants"
consts = "consts"
# short for "Copy"
Cpy = "Cpy"
